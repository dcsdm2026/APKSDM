<div class="space-y-4">
    <!-- Header Modul -->
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h2 class="text-base font-bold text-gray-800 tracking-tight">Manajemen Sertifikat Pegawai</h2>
            <p class="text-xs text-gray-500">Kelola berkas sertifikat diklat, kursus, workshop, dan seminar kompetensi</p>
        </div>
        <button onclick="sertifikatModule.bukaModal()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2.5 rounded-lg shadow-sm transition flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Tambah Rekam Sertifikat
        </button>
    </div>

    <!-- Panel Filter & Cari -->
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-wrap gap-3 items-center">
        <div class="flex-1 min-w-[250px]">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i>
                </span>
                <input type="text" id="cari-sertifikat" oninput="sertifikatModule.cariData()" placeholder="Cari Nama atau Judul..." class="w-full pl-9 pr-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-blue-500 transition">
            </div>
        </div>
        <div class="w-48">
            <select id="filter-jenis" onchange="sertifikatModule.cariData()" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-blue-500 transition">
                <option value="">Semua Jenis</option>
                <option value="Pelatihan">Pelatihan</option>
                <option value="Workshop">Workshop</option>
                <option value="Seminar">Seminar</option>
                <option value="Bimtek">Bimtek</option>
            </select>
        </div>
    </div>

    <!-- Tabel Data -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-xs font-semibold uppercase tracking-wider">
                        <th class="p-3">Pegawai</th>
                        <th class="p-3">Jenis</th>
                        <th class="p-3">Judul Kegiatan Pengembangan</th>
                        <th class="p-3">No. Sertifikat</th>
                        <th class="p-3 text-center">Dokumen</th>
                        <th class="p-3 text-center w-24">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabel-sertifikat-body" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
        <!-- Navigasi Halaman -->
        <div class="p-3 bg-gray-50 border-t border-gray-200 flex justify-between items-center text-xs font-medium text-gray-600">
            <button id="btn-prev" onclick="sertifikatModule.halamanSebelumnya()" class="px-3 py-1 bg-white border border-gray-200 rounded-md hover:bg-gray-100 disabled:opacity-50 transition">Back</button>
            <div id="info-halaman">Halaman: 1</div>
            <button id="btn-next" onclick="sertifikatModule.halamanBerikutnya()" class="px-3 py-1 bg-white border border-gray-200 rounded-md hover:bg-gray-100 disabled:opacity-50 transition">Next</button>
        </div>
    </div>
</div>

<!-- Modal Dialog Box -->
<div id="modal-sertifikat" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-xl border border-gray-200 w-full max-w-md overflow-hidden transform transition-all">
        <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
            <h3 id="modal-title" class="text-xs font-bold text-gray-800">Tambah Data Sertifikat</h3>
            <button onclick="sertifikatModule.tutupModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="form-sertifikat" onsubmit="sertifikatModule.simpanData(event)" class="p-4 space-y-3">
            <input type="hidden" id="form-id">
            
            <div class="relative">
                <label class="block text-[10px] font-bold text-gray-600 uppercase mb-1">Cari Pegawai (Ketik Nama)</label>
                <input type="text" id="autocomplete-input" oninput="sertifikatModule.handleAutocomplete(this.value)" placeholder="Ketik nama untuk mencari..." class="w-full p-2 border border-gray-200 rounded text-xs focus:outline-none focus:border-blue-500" autocomplete="off">
                <div id="autocomplete-results" class="absolute z-10 w-full bg-white border border-gray-200 rounded shadow-lg max-h-40 overflow-y-auto hidden mt-1"></div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[10px] font-bold text-gray-600 uppercase mb-1">NIK</label>
                    <input type="text" id="form-nik" readonly class="w-full p-2 bg-gray-100 border border-gray-200 rounded text-xs text-gray-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-600 uppercase mb-1">Nama Lengkap</label>
                    <input type="text" id="form-nama" readonly class="w-full p-2 bg-gray-100 border border-gray-200 rounded text-xs text-gray-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-600 uppercase mb-1">Jenis Sertifikat</label>
                <select id="form-jenis" required class="w-full p-2 border border-gray-200 rounded text-xs focus:outline-none focus:border-blue-500">
                    <option value="">-- Pilih Jenis --</option>
                    <option value="Pelatihan">Pelatihan</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Seminar">Seminar</option>
                    <option value="Bimtek">Bimtek</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-600 uppercase mb-1">Judul Agenda / Kegiatan</label>
                <input type="text" id="form-judul" required placeholder="Contoh: Pelatihan BTCLS Tenaga Kesehatan" class="w-full p-2 border border-gray-200 rounded text-xs focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-600 uppercase mb-1">Nomor Sertifikat</label>
                <input type="text" id="form-no-sertifikat" required placeholder="No. 440/123/DIKLAT/2026" class="w-full p-2 border border-gray-200 rounded text-xs focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-600 uppercase mb-1">File Dokumen Sertifikat (.pdf)</label>
                <input type="file" id="form-file" class="w-full p-1 border border-gray-200 rounded text-xs bg-slate-50">
                <p id="file-helper" class="text-[9px] text-gray-400 mt-1 hidden">*Kosongkan jika tidak berniat mengubah file lama.</p>
            </div>

            <div class="pt-3 border-t border-gray-100 flex justify-end gap-2">
                <button type="button" onclick="sertifikatModule.tutupModal()" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-semibold rounded-md transition">Batal</button>
                <button type="submit" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-md shadow-sm transition">Simpan</button>
            </div>
        </form>
    </div>
</div>
