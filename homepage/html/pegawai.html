<div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div><p class="text-xs text-gray-400 font-medium uppercase">Total Pegawai</p><h3 class="text-2xl font-bold text-slate-800" id="stat-total">0</h3></div>
        <div class="p-3 bg-blue-50 text-blue-600 rounded-lg"><i class="fa-solid fa-users text-xl"></i></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div><p class="text-xs text-gray-400 font-medium uppercase">Aktif</p><h3 class="text-2xl font-bold text-green-600" id="stat-aktif">0</h3></div>
        <div class="p-3 bg-green-50 text-green-600 rounded-lg"><i class="fa-solid fa-user-check text-xl"></i></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div><p class="text-xs text-gray-400 font-medium uppercase">Resign</p><h3 class="text-2xl font-bold text-red-600" id="stat-resign">0</h3></div>
        <div class="p-3 bg-red-50 text-red-600 rounded-lg"><i class="fa-solid fa-user-minus text-xl"></i></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div><p class="text-xs text-gray-400 font-medium uppercase">Pensiun</p><h3 class="text-2xl font-bold text-amber-600" id="stat-pensiun">0</h3></div>
        <div class="p-3 bg-amber-50 text-amber-600 rounded-lg"><i class="fa-solid fa-user-gradient text-xl"></i></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
        <div><p class="text-xs text-gray-400 font-medium uppercase">Mutasi</p><h3 class="text-2xl font-bold text-purple-600" id="stat-mutasi">0</h3></div>
        <div class="p-3 bg-purple-50 text-purple-600 rounded-lg"><i class="fa-solid fa-shuffle text-xl"></i></div>
    </div>
</div>

<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center flex-1 min-w-[280px] space-x-2">
        <div class="relative flex-1">
            <input type="text" id="cari-pegawai" placeholder="Cari NIK / Nama / NIP..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onkeyup="ambilDataPegawai()">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-xs"></i>
        </div>
        <select id="filter-ruangan" class="border border-gray-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500" onchange="ambilDataPegawai()"></select>
    </div>
    
    <div class="flex flex-wrap gap-2">
        <button onclick="bukaModalForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition flex items-center space-x-1">
            <i class="fa-solid fa-plus"></i> <span>Tambah Pegawai</span>
        </button>
        <button onclick="eksporData('semua', 'excel')" class="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 transition"><i class="fa-regular fa-file-excel"></i> All Excel</button>
        <button onclick="eksporData('semua', 'pdf')" class="bg-rose-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-rose-700 transition"><i class="fa-regular fa-file-pdf"></i> All PDF</button>
        <button onclick="eksporData('belum_lengkap', 'excel')" class="bg-amber-600 text-white px-3 py-2 rounded-lg text-xs font-medium hover:bg-amber-700 transition">Unfilled Excel</button>
        <label class="bg-slate-700 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-800 cursor-pointer transition">
            <i class="fa-solid fa-file-import"></i> Import <input type="file" id="import-file" class="hidden" accept=".csv, .xlsx" onchange="prosesImportFile(this)">
        </label>
    </div>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-max">
            <thead>
                <tr class="bg-slate-50 border-b border-gray-100 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                    <th class="p-4">No</th>
                    <th class="p-4">NIK</th>
                    <th class="p-4">Nama Lengkap</th>
                    <th class="p-4">NIP / Ruangan</th>
                    <th class="p-4">Status & Kelompok</th>
                    <th class="p-4">Masa Kerja</th>
                    <th class="p-4 text-center">Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-pegawai-body" class="text-sm divide-y divide-gray-100">
                </tbody>
        </table>
    </div>
    
    <div class="p-4 border-t border-gray-100 flex items-center justify-between text-sm text-gray-500">
        <span id="pagination-info">Menampilkan data 0 - 0 dari 0 data</span>
        <div class="flex items-center space-x-1">
            <button onclick="halamanSebelumnya()" id="btn-prev" class="px-3 py-1.5 border border-gray-200 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">Back</button>
            <div id="halaman-list" class="flex space-x-1"></div>
            <button onclick="halamanBerikutnya()" id="btn-next" class="px-3 py-1.5 border border-gray-200 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">Next</button>
        </div>
    </div>
</div>

<div id="modal-pegawai" class="hidden fixed inset-0 bg-black/50 z-50 overflow-y-auto flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-4xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
        <div class="p-5 border-b border-gray-100 bg-slate-50 flex items-center justify-between">
            <h3 class="text-lg font-bold text-gray-800" id="modal-title">Form Isian Berkas Pegawai</h3>
            <button onclick="tutupModalForm()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        
        <div class="flex bg-slate-100 border-b border-gray-200 text-xs font-semibold overflow-x-auto">
            <button onclick="gantiTabForm('profil')" id="tab-profil" class="tab-btn px-5 py-3 border-b-2 border-blue-600 text-blue-600 bg-white">1. Profil</button>
            <button onclick="gantiTabForm('keluarga')" id="tab-keluarga" class="tab-btn px-5 py-3 text-gray-600 hover:bg-gray-50">2. Keluarga</button>
            <button onclick="gantiTabForm('pendidikan')" id="tab-pendidikan" class="tab-btn px-5 py-3 text-gray-600 hover:bg-gray-50">3. Pendidikan</button>
            <button onclick="gantiTabForm('kepegawaian')" id="tab-kepegawaian" class="tab-btn px-5 py-3 text-gray-600 hover:bg-gray-50">4. Kepegawaian</button>
            <button onclick="gantiTabForm('lainnya')" id="tab-lainnya" class="tab-btn px-5 py-3 text-gray-600 hover:bg-gray-50">5. Upload Dokumen</button>
        </div>

        <form id="form-isi-pegawai" class="overflow-y-auto p-6 flex-1 text-sm text-gray-700" onsubmit="simpanDataPegawai(event)">
            <input type="hidden" id="f-id">

            <div id="area-profil" class="tab-panel space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block font-medium mb-1">NIK (Nomor Induk Kependudukan)</label><input type="text" id="f-nik" required maxlength="16" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Nama Lengkap</label><input type="text" id="f-nama" required class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Tempat Lahir</label><input type="text" id="f-tempat_lahir" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Tanggal Lahir</label><input type="date" id="f-tanggal_lahir" onchange="hitungPensiunOtomatis()" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">No HP Aktif</label><input type="text" id="f-no_hp" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Email</label><input type="email" id="f-email" class="w-full border rounded-md p-2"></div>
                </div>
                <div><label class="block font-medium mb-1">Alamat Domisili Sesuai KTP</label><textarea id="f-alamat" rows="2" class="w-full border rounded-md p-2"></textarea></div>
            </div>

            <div id="area-keluarga" class="tab-panel hidden space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block font-medium mb-1">Status Pernikahan</label><select id="f-status_keluarga" class="w-full border rounded-md p-2"><option>Lajang</option><option>Menikah</option><option>Cerai Hidup</option><option>Cerai Mati</option></select></div>
                    <div><label class="block font-medium mb-1">No Kartu Keluarga (KK)</label><input type="text" id="f-no_kk" maxlength="16" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Nama Suami/Istri</label><input type="text" id="f-pasangan" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Jumlah Anak</label><select id="f-jml_anak" onchange="kontrolInputAnak(this.value)" class="w-full border rounded-md p-2"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                    <div id="box-anak1" class="hidden"><label class="block font-medium mb-1">Nama Anak Ke-1</label><input type="text" id="f-anak1" class="w-full border rounded-md p-2"></div>
                    <div id="box-anak2" class="hidden"><label class="block font-medium mb-1">Nama Anak Ke-2</label><input type="text" id="f-anak2" class="w-full border rounded-md p-2"></div>
                    <div id="box-anak3" class="hidden"><label class="block font-medium mb-1">Nama Anak Ke-3</label><input type="text" id="f-anak3" class="w-full border rounded-md p-2"></div>
                </div>
            </div>

            <div id="area-pendidikan" class="tab-panel hidden space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block font-medium mb-1">Jenjang Pendidikan Terakhir</label><select id="f-jenjang" class="w-full border rounded-md p-2"><option>Konsultan</option><option>S2 Spesialis</option><option>S2</option><option>S1 Spesialis</option><option>Profesi</option><option>S1</option><option>D4</option><option>D3</option><option>D1</option><option>SMA</option><option>SMP</option><option>SD</option></select></div>
                    <div><label class="block font-medium mb-1">Asal Lembaga Pendidikan/Kampus</label><input type="text" id="f-asal_pendidikan" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Fakultas</label><select id="f-fakultas" class="w-full border rounded-md p-2"></select></div>
                    <div><label class="block font-medium mb-1">Jurusan / Program Studi</label><select id="f-jurusan" class="w-full border rounded-md p-2"></select></div>
                </div>
            </div>

            <div id="area-kepegawaian" class="tab-panel hidden space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div><label class="block font-medium mb-1">NIP (18 Digit)</label><input type="text" id="f-nip" maxlength="18" onkeyup="hitungCpnsDariNip(this.value)" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Status Pegawai</label><select id="f-status_pegawai" class="w-full border rounded-md p-2"><option>Aktif</option><option>Mutasi</option><option>Pensiun</option><option>Resign</option><option>Pensiun Dini</option><option>Lainnya</option></select></div>
                    <div><label class="block font-medium mb-1">Kelompok Pegawai</label><select id="f-kelompok_pegawai" class="w-full border rounded-md p-2"><option>ASN</option><option>APBD</option><option>BLUD</option><option>Konsultan</option><option>Magang</option><option>Outsourcing</option></select></div>
                    <div><label class="block font-medium mb-1">Golongan</label><select id="f-golongan" class="w-full border rounded-md p-2"></select></div>
                    <div><label class="block font-medium mb-1">TMT Pangkat</label><input type="date" id="f-tmt_pangkat" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Kelompok Jabatan</label><select id="f-kelompok_jabatan" class="w-full border rounded-md p-2"><option>Management</option><option>Tenaga Medis</option><option>Tenaga Kesehatan</option><option>Tenaga Penunjang Medis</option><option>Tenaga Administrasi</option><option>Tenaga Non Administrasi</option></select></div>
                    <div><label class="block font-medium mb-1">Jabatan Struktur/Fungsional</label><select id="f-jabatan" class="w-full border rounded-md p-2"></select></div>
                    <div><label class="block font-medium mb-1">TMT Jabatan</label><input type="date" id="f-tmt_jabatan" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Tanggal Masuk RS</label><input type="date" id="f-masuk_rs" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">BUP (Batas Usia Pensiun)</label><select id="f-bup" onchange="hitungPensiunOtomatis()" class="w-full border rounded-md p-2"><option value="58">58 Tahun</option><option value="60">60 Tahun</option><option value="65">65 Tahun</option></select></div>
                    <div><label class="block font-medium mb-1">TMT CPNS</label><input type="date" id="f-tmt_cpns" readonly class="w-full border rounded-md p-2 bg-slate-50"></div>
                    <div><label class="block font-medium mb-1">TMT Pensiun</label><input type="date" id="f-tmt_pensiun" readonly class="w-full border rounded-md p-2 bg-slate-50"></div>
                    <div><label class="block font-medium mb-1">Ruangan Dinas</label><select id="f-ruangan" class="w-full border rounded-md p-2"></select></div>
                    <div><label class="block font-medium mb-1">TMT Nota Dinas</label><input type="date" id="f-tmt_nota" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">Sistem Akses Role</label><select id="f-role" class="w-full border rounded-md p-2"><option>User</option><option>Admin</option></select></div>
                </div>
            </div>

            <div id="area-lainnya" class="tab-panel hidden space-y-4">
                <p class="text-xs text-amber-600 font-medium mb-2"><i class="fa-solid fa-triangle-exclamation"></i> Ekstensi file yang diperbolehkan adalah PDF / Gambar JPG & PNG.</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                    <div><label class="block font-medium mb-1">Upload Pas Foto</label><input type="file" id="up-foto" class="w-full border p-1 rounded"><input type="hidden" id="f-url_foto"></div>
                    <div><label class="block font-medium mb-1">Upload KTP</label><input type="file" id="up-ktp" class="w-full border p-1 rounded"><input type="hidden" id="f-url_ktp"></div>
                    <div><label class="block font-medium mb-1">Upload KK</label><input type="file" id="up-kk" class="w-full border p-1 rounded"><input type="hidden" id="f-url_kk"></div>
                    <div><label class="block font-medium mb-1">Upload Ijazah</label><input type="file" id="up-ijazah" class="w-full border p-1 rounded"><input type="hidden" id="f-url_ijazah"></div>
                    <div><label class="block font-medium mb-1">Upload Transkrip</label><input type="file" id="up-transkrip" class="w-full border p-1 rounded"><input type="hidden" id="f-url_transkrip"></div>
                    <div><label class="block font-medium mb-1">Upload SK Pangkat</label><input type="file" id="up-pangkat" class="w-full border p-1 rounded"><input type="hidden" id="f-url_pangkat"></div>
                    <div><label class="block font-medium mb-1">Upload SK Jabatan</label><input type="file" id="up-jabatan" class="w-full border p-1 rounded"><input type="hidden" id="f-url_jabatan"></div>
                    <div><label class="block font-medium mb-1">Upload Nota Dinas</label><input type="file" id="up-nota" class="w-full border p-1 rounded"><input type="hidden" id="f-url_nota"></div>
                    <div><label class="block font-medium mb-1">Upload BPJS Kes</label><input type="file" id="up-bpjs" class="w-full border p-1 rounded"><input type="hidden" id="f-url_bpjs"></div>
                    <div><label class="block font-medium mb-1">Upload Taspen/Ketenagakerjaan</label><input type="file" id="up-taspen" class="w-full border p-1 rounded"><input type="hidden" id="f-url_ketenagakerjaan_taspen"></div>
                    <div><label class="block font-medium mb-1">Upload NPWP</label><input type="file" id="up-npwp" class="w-full border p-1 rounded"><input type="hidden" id="f-url_npwp"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                    <div><label class="block font-medium mb-1">No BPJS Kesehatan</label><input type="text" id="f-bpjs_kesehatan" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">No Ketenagakerjaan/Taspen</label><input type="text" id="f-ketenagakerjaan_taspen" class="w-full border rounded-md p-2"></div>
                    <div><label class="block font-medium mb-1">No NPWP</label><input type="text" id="f-npwp" class="w-full border rounded-md p-2"></div>
                </div>
            </div>

            <div class="mt-6 border-t pt-4 flex items-center justify-end space-x-2">
                <button type="button" onclick="tutupModalForm()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium">Batal</button>
                <button type="submit" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium shadow-md">Simpan Data Berkas</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
<script src="homepage/js/pegawai.js"></script>
