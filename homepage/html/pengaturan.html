<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 max-w-3xl">
    <h3 class="text-base font-bold text-gray-800 mb-4">Tambah Entitas Baru Parameter Dropdown</h3>
    
    <form id="form-pengaturan" onsubmit="simpanMasterData(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
        <div>
            <label class="block font-medium text-gray-700 mb-1">Pilih Kategori Master</label>
            <select id="p-master_data" required class="w-full border rounded-md p-2">
                <option value="golongan">Golongan</option>
                <option value="ruangan">Ruangan</option>
                <option value="jabatan">Jabatan Struktur/Fungsional</option>
                <option value="fakultas">Fakultas</option>
                <option value="jurusan">Jurusan Pendidikan</option>
            </select>
        </div>
        <div class="md:col-span-2">
            <label class="block font-medium text-gray-700 mb-1">Nama Keterangan / Nilai</label>
            <div class="flex space-x-2">
                <input type="text" id="p-keterangan" required placeholder="Contoh: Ruang ICU / Golongan IV-A" class="w-full border rounded-md p-2">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-md font-medium transition">Tambah</button>
            </div>
        </div>
    </form>

    <div class="mt-8">
        <h4 class="text-sm font-semibold text-gray-600 mb-3 uppercase tracking-wider">Daftar Parameter Terdaftar</h4>
        <div class="overflow-x-auto border rounded-lg">
            <table class="w-full text-left text-sm text-gray-600">
                <thead class="bg-slate-50 border-b text-xs font-semibold uppercase">
                    <tr>
                        <th class="p-3">Kategori Master</th>
                        <th class="p-3">Keterangan Parameter</th>
                        <th class="p-3 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabel-pengaturan-body" class="divide-y">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="homepage/js/pengaturan.js"></script>
