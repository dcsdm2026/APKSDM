<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Utama - SIMPEG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex min-h-screen text-gray-800">

    <aside id="sidebar" class="w-64 bg-slate-900 text-slate-200 fixed lg:static inset-y-0 left-0 z-50 flex flex-col justify-between shadow-xl transition-all duration-300">
        <div>
            <div class="p-5 flex items-center justify-between border-b border-slate-800">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 p-2 rounded-lg text-white font-bold text-xl">+</div>
                    <span class="font-bold text-lg tracking-wider">SIMPEG APP</span>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <nav class="p-4 space-y-2">
                <button onclick="loadMenu('homepage/html/pegawai.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg bg-slate-800 text-white text-left transition hover:bg-slate-700">
                    <i class="fa-solid fa-users w-6"></i>
                    <span>Data Pegawai</span>
                </button>
                <button onclick="loadMenu('homepage/html/spkrkk.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-left transition hover:bg-slate-800">
                    <i class="fa-solid fa-file-shield w-6"></i>
                    <span>SPK & RKK Pegawai</span>
                </button>
                <button onclick="loadMenu('homepage/html/pengaturan.html')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-left transition hover:bg-slate-800">
                    <i class="fa-solid fa-gear w-6"></i>
                    <span>Pengaturan Sistem</span>
                </button>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center space-x-3 mb-4 px-2">
                <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-bold text-blue-400 shadow" id="user-avatar">
                    A
                </div>
                <div class="overflow-hidden">
                    <h4 class="text-sm font-semibold truncate" id="user-nama">Loading...</h4>
                    <span class="text-xs text-slate-500 truncate block" id="user-role">User</span>
                </div>
            </div>
            <button onclick="keluarSesi()" class="w-full flex items-center space-x-3 px-4 py-2.5 bg-red-900/40 hover:bg-red-900 text-red-200 rounded-lg transition text-left text-sm">
                <i class="fa-solid fa-right-from-bracket w-6"></i>
                <span>Keluar Aplikasi</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-x-hidden">
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-6 shadow-sm">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg text-gray-600 hover:bg-gray-100 focus:outline-none">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <h1 class="text-xl font-semibold text-gray-700" id="header-title">Data Manajemen Pegawai</h1>
            <div class="text-sm text-gray-400" id="live-clock">June 2026</div>
        </header>

        <main class="p-6 flex-1 max-w-7xl w-full mx-auto" id="main-frame">
            </main>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="app/koneksi.js"></script>

    <script src="homepage/js/pegawai.js"></script>
    <script src="homepage/js/spkrkk.js"></script>
    <script src="homepage/js/pengaturan.js"></script>

    <script src="app/app.js"></script>
</body>
</html>
