<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HRIS RSUD Drs. H. Amri Tambunan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper d-flex">
        <nav id="sidebar" class="bg-dark-blue text-white active">
            <div class="sidebar-header p-3 text-center border-bottom border-secondary">
                <i class="fa-solid fa-square-h fa-2x text-warning mb-1"></i>
                <h5 class="m-0 fw-bold header-title">HRIS RSUD</h5>
            </div>
            <ul class="list-unstyled components p-2">
                <li class="active">
                    <a href="#" class="nav-link text-white p-3 d-block rounded" data-target="pegawai-container">
                        <i class="fa-solid fa-users me-2"></i> Data Pegawai
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link text-white p-3 d-block rounded" id="btnMenuPengaturan">
                        <i class="fa-solid fa-gear me-2"></i> Pengaturan
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer p-3 border-top border-secondary position-absolute bottom-0 w-100">
                <div class="d-flex align-items-center justify-content-between">
                    <small id="userLabel" class="text-truncate me-2">Admin</small>
                    <button class="btn btn-danger btn-sm" id="btnLogout"><i class="fa-solid fa-power-off"></i></button>
                </div>
            </div>
        </nav>

        <div id="content" class="w-100 bg-light-gray">
            <nav class="navbar navbar-expand-lg navbar-light bg-white p-3 shadow-sm">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-primary">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <span class="ms-3 fw-semibold text-secondary d-none d-sm-inline">Sistem Informasi Manajemen Kepegawaian</span>
                </div>
            </nav>

            <div class="p-4" id="mainFrame">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>

    <script src="app/koneksi.js"></script>
    <script src="app/app.js"></script>
</body>
</html>
