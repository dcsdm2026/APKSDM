<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HRIS RSUD Drs. H. Amri Tambunan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/portal.css">
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="login-card p-4 shadow-lg text-center">
        <div class="logo-area mb-3">
            <i class="fa-solid fa-hospital-user text-primary fa-3x mb-2"></i>
            <h4 class="fw-bold text-dark m-0">HRIS PORTAL</h4>
            <small class="text-secondary">RSUD Drs. H. Amri Tambunan</small>
        </div>
        <hr>
        <form id="loginForm" class="text-start mt-3">
            <div class="mb-3">
                <label class="form-label font-sm"><i class="fa-solid fa-envelope me-1 text-primary"></i> Email</label>
                <input type="email" id="email" class="form-control" placeholder="nama@rsud.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label font-sm"><i class="fa-solid fa-lock me-1 text-primary"></i> Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-semibold">
                Masuk Sistem <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app/koneksi.js"></script>
    <script src="app/portal.js"></script>
</body>
</html>
