<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - SIM RSUD Kepegawaian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/css/portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="w-full max-w-md p-6">
        <div class="login-card p-8">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 text-white rounded-full text-3xl font-bold mb-3 shadow-md">
                    +
                </div>
                <h2 class="text-2xl font-bold text-gray-800">SIMPEG RSUD</h2>
                <p class="text-sm text-gray-500">Sistem Informasi Manajemen Kepegawaian</p>
            </div>
            
            <div id="alert-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 text-sm rounded-lg"></div>

            <form id="form-login" onsubmit="prosesLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Alamat Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="nama@rsud.com">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kata Sandi</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition duration-200 shadow-md">
                    Masuk ke Sistem
                </button>
            </form>
        </div>
    </div>
    <script src="/app/koneksi.js"></script>
    <script src="/app/portal.js"></script>
</body>
</html>
